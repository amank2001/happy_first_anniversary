<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo,createContext,useContext}=React;

/* ══════════════════════════════════════════════════════
   CONTEXT
══════════════════════════════════════════════════════ */
const AppCtx=createContext({});

/* ══════════════════════════════════════════════════════
   CONFETTI ENGINE
══════════════════════════════════════════════════════ */
function launchConfetti(duration=4200){
  const canvas=document.getElementById('confetti-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
  const W=canvas.width,H=canvas.height;
  const colors=['#e8758a','#c9a84c','#f0d080','#f5b0c5','#ffffff','#ff9eb5','#ffd700','#e87888'];
  const shapes=['rect','circle','heart'];
  const pieces=Array.from({length:160},()=>({
    x:Math.random()*W,y:-20-Math.random()*140,
    vx:(Math.random()-0.5)*4.5,vy:2.5+Math.random()*4,
    r:4+Math.random()*8,
    color:colors[Math.floor(Math.random()*colors.length)],
    shape:shapes[Math.floor(Math.random()*shapes.length)],
    rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.18,
    alpha:1,decay:.004+Math.random()*.006
  }));
  const start=performance.now();
  function draw(now){
    ctx.clearRect(0,0,W,H);
    const elapsed=now-start;
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.rot+=p.rv;
      if(elapsed>duration*.6)p.alpha=Math.max(0,p.alpha-p.decay);
      ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;
      if(p.shape==='rect'){ctx.fillRect(-p.r/2,-p.r*.4,p.r,p.r*.8)}
      else if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.r/2,0,Math.PI*2);ctx.fill()}
      else{// heart
        const s=p.r*.045;ctx.beginPath();ctx.moveTo(0,-s*2);
        ctx.bezierCurveTo(s*3,-s*5,s*7,s,0,s*5);
        ctx.bezierCurveTo(-s*7,s,-s*3,-s*5,0,-s*2);ctx.fill();
      }
      ctx.restore();
    });
    if(elapsed<duration+1000)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,W,H);
  }
  requestAnimationFrame(draw);
}

/* ══════════════════════════════════════════════════════
   MUSIC ENGINE
══════════════════════════════════════════════════════ */
function playNote(ctx,dst,freq,when,dur,vol=.22){
  const o1=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain();
  o1.type='sine';o2.type='triangle';
  o1.frequency.value=freq;o2.frequency.value=freq*2.004;
  g.gain.setValueAtTime(.001,when);
  g.gain.linearRampToValueAtTime(vol,when+.06);
  g.gain.exponentialRampToValueAtTime(vol*.58,when+.3);
  g.gain.setValueAtTime(vol*.58,Math.max(when+.3,when+dur-.3));
  g.gain.exponentialRampToValueAtTime(.001,when+dur);
  [o1,o2].forEach(o=>{o.connect(g);o.start(when);o.stop(when+dur)});
  g.connect(dst);
}
const CHORDS=[[261.63,329.63,392],[293.66,369.99,440],[246.94,311.13,369.99],[220,277.18,329.63]];
const SEQ=[
  [293.66,.5,.22],[329.63,.5,.22],[392,.5,.26],[440,.7,.28],[493.88,.5,.26],[440,.5,.24],[392,.5,.22],[329.63,.7,.28],
  [261.63,.5,.2],[293.66,.5,.2],[329.63,.5,.24],[369.99,.95,.3],[440,.5,.28],[493.88,.5,.28],[523.25,.5,.3],[493.88,.95,.32],
  [440,.5,.26],[369.99,.5,.22],[329.63,.5,.24],[293.66,.7,.28],[261.63,.5,.2],[246.94,.5,.18],[261.63,.5,.2],[293.66,.95,.3],
  [329.63,.5,.22],[369.99,.5,.24],[440,.5,.28],[493.88,.7,.3],[523.25,.5,.32],[493.88,.5,.28],[440,.5,.26],[392,.7,.28],
];

/* ══════════════════════════════════════════════════════
   SHARED VISUAL COMPONENTS
══════════════════════════════════════════════════════ */
function Stars({n=40}){
  const s=useMemo(()=>Array.from({length:n},(_,i)=>({
    l:(i*2.14+3)%100,t:(i*1.97+5)%100,sz:1+(i%3),d:(i*.19)%3,sp:1.4+(i%3)*.5,g:i%4===0
  })),[n]);
  return <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden'}}>
    {s.map((st,i)=><div key={i} style={{position:'absolute',left:`${st.l}%`,top:`${st.t}%`,
      width:st.sz,height:st.sz,borderRadius:'50%',
      background:st.g?'#f0d090':'rgba(255,232,205,.65)',
      animation:`twinkle ${st.sp}s ${st.d}s infinite ease-in-out`}}/>)}
  </div>;
}

function Particles(){
  const chars=['❤','✦','✧','·','♥','˙','✿'];
  return <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:4,overflow:'hidden'}}>
    {Array.from({length:20},(_,i)=><span key={i} style={{
      position:'absolute',bottom:'-18px',left:`${(i*4.8+1)%96}%`,
      fontSize:`${11+(i*3)%17}px`,
      color:['#e8758a','#c9a84c','#f5d0e0'][i%3],
      animation:`floatUp ${5+(i*.65)%6}s ${(i*.42)%7.5}s infinite ease-in-out`
    }}>{chars[i%7]}</span>)}
  </div>;
}

function Petals({n=14}){
  const items=useMemo(()=>Array.from({length:n},(_,i)=>({
    left:`${(i*6.8+2)%97}%`,
    color:['#e8758a','#c9a84c','#f0d080','#f5b0c5'][i%4],
    size:`${4+(i%4)}px`,delay:`${(i*.35)%4.5}s`,dur:`${4+(i%3)*.7}s`
  })),[n]);
  return <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:3,overflow:'hidden'}}>
    {items.map((p,i)=><div key={i} style={{position:'absolute',left:p.left,top:'-12px',
      width:p.size,height:p.size,borderRadius:'50%',background:p.color,
      animation:`dropPetal ${p.dur} ${p.delay} infinite linear`,opacity:.75}}/>)}
  </div>;
}

function SectionHead({script,sub,delay='0s'}){
  return <>
    <div className="rv" style={{fontFamily:'"Great Vibes",cursive',fontSize:52,
      color:'rgba(201,168,76,.9)',marginBottom:5,textAlign:'center',

      letterSpacing:5,textTransform:'uppercase',color:'rgba(232,160,180,.5)',
      marginBottom:42,position:'relative',zIndex:2}}>{sub}</div>
  </>;
}

function Divider(){
  return <div style={{width:1,height:70,margin:'0 auto',
    background:'linear-gradient(to bottom,transparent,rgba(201,168,76,.38),transparent)'}}/>
}

/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
function Toast({msg,visible}){
  return <div style={{
    position:'fixed',bottom:32,left:'50%',
    background:'linear-gradient(135deg,rgba(140,20,58,.96),rgba(90,8,38,.98))',
    border:'1px solid rgba(201,168,76,.4)',borderRadius:100,
    padding:'10px 24px',zIndex:200,pointerEvents:'none',
    fontFamily:'"Cormorant Garamond",serif',fontSize:15,fontStyle:'italic',
    color:'rgba(255,240,210,.92)',whiteSpace:'nowrap',
    animation:visible?'toastIn .4s ease forwards':'toastOut .4s ease forwards',
    boxShadow:'0 8px 32px rgba(0,0,0,.55)'
  }}>{msg}</div>;
}

/* ══════════════════════════════════════════════════════
   SPLASH / ONBOARDING
══════════════════════════════════════════════════════ */
function Splash({onDone}){
  const [name,setName]=useState('');
  const [date,setDate]=useState('');
  const [step,setStep]=useState(0); // 0=name,1=date,2=animating
  const [err,setErr]=useState('');

  const submitName=()=>{
    if(!name.trim()){setErr('Please enter her name 💕');return}
    setErr('');setStep(1);
  };
  const submitDate=()=>{
    const d=date?new Date(date):new Date(new Date().setFullYear(new Date().getFullYear()-1));
    setStep(2);
    setTimeout(()=>{launchConfetti(4500);onDone(name.trim(),d)},800);
  };

  return <div style={{
    position:'fixed',inset:0,zIndex:300,
    background:`radial-gradient(ellipse at 20% 40%,rgba(170,25,75,.72) 0%,transparent 52%),radial-gradient(ellipse at 80% 25%,rgba(110,15,62,.6) 0%,transparent 52%),linear-gradient(155deg,#050103,#1c0412,#0e0210)`,
    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
    padding:'28px 28px',textAlign:'center',
    animation:step===2?'splashFade .8s ease forwards':'none',
    overflow:'hidden'
  }}>
    <Stars n={70}/>
    <Particles/>

    {/* Animated heart */}
    <div style={{fontSize:58,marginBottom:28,animation:'heartbeat 2.5s ease-in-out infinite',
      filter:'drop-shadow(0 0 18px rgba(201,168,76,.45))'}}>❤️</div>

    <div style={{fontFamily:'"Great Vibes",cursive',fontSize:50,lineHeight:1.1,
      color:'rgba(255,255,255,.96)',textShadow:'0 0 38px rgba(201,168,76,.5)',
      marginBottom:8}}>Happy Anniversary</div>
    <div style={{fontFamily:'"Cormorant Garamond",serif',fontSize:11,letterSpacing:5,
      textTransform:'uppercase',color:'rgba(232,160,180,.55)',marginBottom:44}}>
      let's personalise your gift</div>

    {step===0&&<div style={{width:'100%',maxWidth:300,display:'flex',flexDirection:'column',gap:14}}>
      <div style={{fontFamily:'"Playfair Display",serif',fontStyle:'italic',fontSize:18,
        color:'rgba(255,235,210,.75)',marginBottom:4}}>What's her name?</div>
      <input className="input-gold" placeholder="Her beautiful name…"
        value={name} onChange={e=>setName(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&submitName()}
        autoFocus style={{fontSize:20}}/>
      {err&&<div style={{color:'rgba(232,120,130,.8)',fontSize:13,fontStyle:'italic'}}>{err}</div>}
      <button className="btn-gold" onClick={submitName} style={{marginTop:4,fontSize:17}}>
        Next ✦
      </button>
    </div>}

    {step===1&&<div style={{width:'100%',maxWidth:300,display:'flex',flexDirection:'column',gap:14,
      animation:'springUp .7s cubic-bezier(.23,1,.32,1) both'}}>
      <div style={{fontFamily:'"Playfair Display",serif',fontStyle:'italic',fontSize:18,
        color:'rgba(255,235,210,.75)',marginBottom:4}}>When did your story begin?</div>
      <input type="date" className="input-gold" value={date} onChange={e=>setDate(e.target.value)}
        style={{colorScheme:'dark',fontSize:16}}/>
      <div style={{fontSize:13,fontStyle:'italic',color:'rgba(232,160,180,.45)'}}>
        Leave empty to use today's date one year ago
      </div>
      <button className="btn-gold" onClick={submitDate} style={{marginTop:4,fontSize:17}}>
        Begin Our Story 💕
      </button>
      <button onClick={()=>setStep(0)} style={{background:'none',border:'none',cursor:'pointer',
        color:'rgba(201,168,76,.45)',fontSize:13,fontFamily:'"Cormorant Garamond",serif',
        fontStyle:'italic'}}>← back</button>
    </div>}

    {step===2&&<div style={{fontFamily:'"Great Vibes",cursive',fontSize:36,
      color:'rgba(201,168,76,.85)',animation:'springUp .6s ease both'}}>
      Loading your love story…
    </div>}
  </div>;
}

/* ══════════════════════════════════════════════════════
   LOVE COUNTER
══════════════════════════════════════════════════════ */
function LoveCounter({startDate}){
  const [,tick]=useState(0);
  useEffect(()=>{const t=setInterval(()=>tick(v=>v+1),1000);return()=>clearInterval(t)},[]);
  const diff=Date.now()-startDate.getTime();
  const units=[
    {v:Math.floor(diff/86400000),u:'Days'},
    {v:Math.floor((diff%86400000)/3600000),u:'Hours'},
    {v:Math.floor((diff%3600000)/60000),u:'Mins'},
    {v:Math.floor((diff%60000)/1000),u:'Secs'}
  ];
  return <div className="rv" style={{maxWidth:340,width:'100%',margin:'0 auto',
    background:'linear-gradient(135deg,rgba(40,5,20,.9),rgba(22,3,12,.95))',
    border:'1px solid rgba(201,168,76,.35)',borderRadius:14,padding:'24px 16px',
    position:'relative',zIndex:2,boxShadow:'0 22px 65px rgba(0,0,0,.55),inset 0 1px 0 rgba(201,168,76,.1)'}}>
    <div style={{position:'absolute',inset:0,borderRadius:14,pointerEvents:'none',overflow:'hidden',
      background:'radial-gradient(ellipse at 50% -5%,rgba(201,168,76,.05) 0%,transparent 55%)'}}/>
    <div style={{fontFamily:'"Great Vibes",cursive',fontSize:26,color:'rgba(201,168,76,.78)',
      textAlign:'center',marginBottom:18}}>Together For</div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
      {units.map(({v,u},i)=><div key={i} style={{textAlign:'center'}}>
        <div style={{background:'rgba(201,168,76,.07)',border:'1px solid rgba(201,168,76,.2)',
          borderRadius:8,padding:'10px 4px',marginBottom:5}}>
          <div key={v} style={{fontFamily:'"Playfair Display",serif',fontWeight:700,
            fontSize:22,color:'rgba(201,168,76,.9)',lineHeight:1,
            animation:'counterNum .25s ease both'}}>
            {String(v).padStart(2,'0')}
          </div>
        </div>
        <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',
          color:'rgba(232,160,180,.5)'}}>{u}</div>
      </div>)}
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════
   HERO
══════════════════════════════════════════════════════ */
function Hero({sy,name,startDate}){
  return <section style={{minHeight:'100svh',
    background:`radial-gradient(ellipse at 18% 38%,rgba(172,25,78,.72) 0%,transparent 52%),radial-gradient(ellipse at 82% 22%,rgba(112,16,62,.62) 0%,transparent 52%),radial-gradient(ellipse at 50% 88%,rgba(76,8,38,.74) 0%,transparent 52%),linear-gradient(155deg,#050103 0%,#1c0412 48%,#0e0210 100%)`,

    <Stars n={75}/>

      transform:`translateY(${sy*.28}px)`,transition:'transform .05s'}}/>
    {/* Deco ring */}
    <div style={{position:'relative',marginBottom:30,zIndex:2}}>
      <div style={{width:190,height:190,borderRadius:'50%',
        display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
        <div style={{position:'absolute',inset:0,borderRadius:'50%',
          border:'1px dashed rgba(201,168,76,.2)',animation:'rotateRing 22s linear infinite'}}/>

function LoveLetter({name}){
  const LETTER=`My dearest ${name},\n\nOne year ago, you walked into my life and turned it into the most beautiful story I've ever known.\n\nEvery morning with you feels like the first page of a new chapter. Every laugh we share, every adventure we take, every quiet moment we hold — they are all woven into the fabric of who I am now.\n\nYou are my sunshine on cloudy days, my calm in every storm, my favourite place to be. You make ordinary moments feel extraordinary just by being you.\n\nHappy First Anniversary, my love. Here's to a lifetime of us — of growing together, loving fiercely, and writing the most beautiful story the universe has ever seen.\n\nForever yours,\nAman with all his heart ❤️`;
  const [shown,setShown]=useState('');
  const [started,setStarted]=useState(false);
  const ref=useRef(null);const tRef=useRef(null);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting&&!started)setStarted(true)},{threshold:.18});
    if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();
  },[started]);
  useEffect(()=>{
    if(!started)return;let i=0;
    const d=setTimeout(()=>{
      tRef.current=setInterval(()=>{i++;setShown(LETTER.slice(0,i));if(i>=LETTER.length)clearInterval(tRef.current)},17);
    },500);
    return()=>{clearTimeout(d);clearInterval(tRef.current)};
  },[started,LETTER]);
  return <section style={{minHeight:'100svh',position:'relative',overflow:'hidden',
    background:`radial-gradient(ellipse at 50% 5%,rgba(155,22,65,.22) 0%,transparent 52%),linear-gradient(180deg,#060104,#160412)`,
    padding:'88px 20px 108px',display:'flex',flexDirection:'column',alignItems:'center'}}>

      background:'linear-gradient(158deg,#fdf9f0,#fef7ea 55%,#fdf5e5)',
      borderRadius:3,padding:'40px 28px 44px',
      boxShadow:'0 32px 88px rgba(0,0,0,.72),0 8px 24px rgba(0,0,0,.46),inset 0 1px 0 rgba(255,255,255,.95)',
      position:'relative',overflow:'hidden',zIndex:2}}>
      <div style={{position:'absolute',inset:0,pointerEvents:'none',
        backgroundImage:'repeating-linear-gradient(transparent,transparent 27px,rgba(150,110,130,.09) 27px,rgba(150,110,130,.09) 28px)',
        backgroundPosition:'0 44px'}}/>
      <div style={{position:'absolute',left:56,top:0,bottom:0,width:1,background:'rgba(185,95,115,.13)'}}/>
      <div style={{position:'absolute',top:12,right:12,width:42,height:42,borderRadius:'50%',
        background:'radial-gradient(circle at 35% 35%,#c23060,#8b1a3c)',
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:16,boxShadow:'0 4px 14px rgba(0,0,0,.38)',color:'rgba(255,215,215,.92)',
        animation:'glowRing 3.5s ease-in-out infinite'}}>❤</div>
      <div style={{position:'absolute',bottom:10,left:12,fontSize:20,opacity:.14,color:'#7b2244'}}>✦</div>
      <div style={{fontFamily:'"Cormorant Garamond",serif',fontSize:15.5,lineHeight:'28px',
        color:'#3d1a2a',whiteSpace:'pre-line',position:'relative',zIndex:1,paddingLeft:15}}>
        {shown}
        {shown.length<LETTER.length&&<span style={{display:'inline-block',width:2,height:16,
          background:'#7b2244',marginLeft:1,verticalAlign:'middle',
          animation:'blink 1s step-end infinite'}}/>}
      </div>
    </div>
  </section>;
}

    {t:'role',r:'Special Thanks',v:'Every laugh, every hug'},
    {t:'divider'},
    {t:'quote',v:'"And so the adventure begins..."'},
    {t:'divider'},
    {t:'small',v:`© ${new Date().getFullYear()} — Our Love Story`},
    {t:'small',v:'Made with ❤️ for you'},
  ];
  return <section style={{position:'relative',overflow:'hidden',
    background:'#030002',padding:'0',minHeight:'80svh',
    display:'flex',flexDirection:'column',alignItems:'center'}}>
    <Stars n={55}/>
    {/* Film strip top */}
    <div style={{width:'100%',height:28,
      background:'repeating-linear-gradient(90deg,#111 0px,#111 18px,#060104 18px,#060104 26px)',
      opacity:.6,borderBottom:'1px solid rgba(201,168,76,.12)'}}/>
    <div style={{overflow:'hidden',position:'relative',width:'100%',
      maxHeight:'70svh',display:'flex',justifyContent:'center'}}>
      <div style={{width:'100%',maxWidth:380,padding:'50px 32px 80px',
        animation:'creditsScroll 28s linear forwards',animationDelay:'1s'}}>
        {lines.map((l,i)=><div key={i} style={{
          textAlign:'center',
          marginBottom:l.t==='divider'?30:l.t==='section'?6:12,
          ...(l.t==='section'&&{fontFamily:'"Great Vibes",cursive',fontSize:38,color:'rgba(201,168,76,.88)',marginBottom:4}),
          ...(l.t==='sub'&&{fontFamily:'"Cormorant Garamond",serif',fontStyle:'italic',fontSize:15,color:'rgba(232,160,180,.55)',letterSpacing:1,marginBottom:22}),
          ...(l.t==='divider'&&{width:60,height:1,background:'rgba(201,168,76,.2)',margin:'22px auto'}),
          ...(l.t==='role'&&{}),
          ...(l.t==='quote'&&{fontFamily:'"Playfair Display",serif',fontStyle:'italic',fontSize:18,color:'rgba(255,255,255,.72)',lineHeight:1.7,margin:'8px 0 24px'}),
          ...(l.t==='small'&&{fontFamily:'"Cormorant Garamond",serif',fontSize:13,color:'rgba(201,168,76,.3)',letterSpacing:2}),
        }}>
          {l.t==='role'&&<>
            <div style={{fontSize:11,letterSpacing:3,textTransform:'uppercase',
              color:'rgba(201,168,76,.45)',marginBottom:3}}>{l.r}</div>
            <div style={{fontFamily:'"Playfair Display",serif',fontSize:17,
              color:'rgba(255,255,255,.78)'}}>{l.v}</div>
          </>}
          {l.t!=='role'&&l.v}
        </div>)}
      </div>
    </div>
    {/* Film strip bottom */}
    <div style={{width:'100%',height:28,
      background:'repeating-linear-gradient(90deg,#111 0px,#111 18px,#060104 18px,#060104 26px)',
      opacity:.6,borderTop:'1px solid rgba(201,168,76,.12)'}}/>
  </section>;
}

/* ══════════════════════════════════════════════════════
   MUSIC BUTTON
══════════════════════════════════════════════════════ */
function MusicBtn({on,toggle}){
  return <button onClick={toggle} style={{
    position:'fixed',bottom:22,right:18,
    width:52,height:52,borderRadius:'50%',
    border:`1px solid rgba(201,168,76,${on?.58:.28})`,
    background:on
      ?'linear-gradient(135deg,rgba(150,22,60,.95),rgba(100,10,42,.97))'
      :'rgba(8,2,6,.9)',
    backdropFilter:'blur(18px)',
    display:'flex',alignItems:'center',justifyContent:'center',
    cursor:'pointer',fontSize:20,zIndex:100,
    boxShadow:on?'0 0 32px rgba(201,168,76,.55)':'0 4px 18px rgba(0,0,0,.65)',
    transition:'all .38s cubic-bezier(.23,1,.32,1)',
    animation:on?'glowRing 2.4s ease-in-out infinite':'none'}}>
    {on?'🎵':'🔇'}
  </button>;
}

/* ══════════════════════════════════════════════════════
   SHARE BUTTON
══════════════════════════════════════════════════════ */
function ShareBtn({name,showToast}){
  const share=async()=>{
    const msg=`Happy 1st Anniversary, ${name}! 💕\n\nI made this just for you — a little piece of my heart wrapped in stars and music 🌟❤️`;
    try{
      if(navigator.share){await navigator.share({title:'Happy Anniversary 💕',text:msg})}
      else{await navigator.clipboard.writeText(msg);showToast('Message copied! 💕')}
    }catch(e){showToast('Share with love ❤️')}
  };
  return <button onClick={share} style={{
    position:'fixed',bottom:22,left:18,
    width:52,height:52,borderRadius:'50%',
    border:'1px solid rgba(201,168,76,.28)',
    background:'rgba(8,2,6,.9)',
    backdropFilter:'blur(18px)',
    display:'flex',alignItems:'center',justifyContent:'center',
    cursor:'pointer',fontSize:20,zIndex:100,
    boxShadow:'0 4px 18px rgba(0,0,0,.65)',
    transition:'all .38s ease'}}>
    🔗
  </button>;
}

/* ══════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════ */
function App(){
  const [ready,setReady]=useState(false);
  const [name,setName]=useState('My Love');
  const [startDate,setStartDate]=useState(new Date(new Date().setFullYear(new Date().getFullYear()-1)));
  const [sy,setSy]=useState(0);
  const [music,setMusic]=useState(false);
  const [toast,setToast]=useState({msg:'',visible:false});
  const ctxRef=useRef(null),gainRef=useRef(null),schedRef=useRef(null),
        niRef=useRef(0),ntRef=useRef(0);

  const showToast=useCallback((msg)=>{
    setToast({msg,visible:true});
    setTimeout(()=>setToast(p=>({...p,visible:false})),2800);
  },[]);

  const onSplashDone=useCallback((n,d)=>{
    setName(n);setStartDate(d);
    setTimeout(()=>setReady(true),850);
  },[]);

  useEffect(()=>{
    if(!ready)return;
    const fn=()=>setSy(window.scrollY);
    window.addEventListener('scroll',fn,{passive:true});
    return()=>window.removeEventListener('scroll',fn);
  },[ready]);

  useEffect(()=>{
    if(!ready)return;
    const els=document.querySelectorAll('.rv,.rv-l,.rv-r,.rv-z');
    const obs=new IntersectionObserver(
      es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),
      {threshold:.1,rootMargin:'0px 0px -35px 0px'}
    );
    els.forEach(el=>obs.observe(el));return()=>obs.disconnect();
  },[ready]);

  const sched=useCallback(()=>{
    if(!ctxRef.current||!gainRef.current)return;
    const ctx=ctxRef.current;
    while(ntRef.current<ctx.currentTime+.28){
      const[freq,dur,vol]=SEQ[niRef.current%SEQ.length];
      playNote(ctx,gainRef.current,freq,ntRef.current,dur,vol);
      if(niRef.current%8===0){
        const ch=CHORDS[(Math.floor(niRef.current/8))%CHORDS.length];
        ch.forEach(f=>playNote(ctx,gainRef.current,f,ntRef.current,.78,.038));
      }
      ntRef.current+=dur;niRef.current++;
    }
  },[]);

  const toggleMusic=useCallback(()=>{
    if(music){
      clearInterval(schedRef.current);
      if(gainRef.current&&ctxRef.current){
        gainRef.current.gain.linearRampToValueAtTime(0,ctxRef.current.currentTime+1.5);
        setTimeout(()=>{ctxRef.current?.close();ctxRef.current=null;gainRef.current=null},1800);
      }
      setMusic(false);
    } else {
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const master=ctx.createGain(),dly=ctx.createDelay(.72),dg=ctx.createGain();
      dg.gain.value=.18;
      master.connect(ctx.destination);master.connect(dly);dly.connect(dg);dg.connect(ctx.destination);
      master.gain.setValueAtTime(0,ctx.currentTime);
      master.gain.linearRampToValueAtTime(1,ctx.currentTime+2.8);
      ctxRef.current=ctx;gainRef.current=master;
      ntRef.current=ctx.currentTime+.12;niRef.current=0;
      schedRef.current=setInterval(sched,95);sched();
      setMusic(true);
    }
  },[music,sched]);

  if(!ready)return <Splash onDone={onSplashDone}/>;

  return <div style={{animation:'appReveal .7s ease both'}}>
    <Particles/>
    <Petals n={14}/>
    <MusicBtn on={music} toggle={toggleMusic}/>
    <ShareBtn name={name} showToast={showToast}/>
    {toast.visible&&<Toast msg={toast.msg} visible={toast.visible}/>}
    <Hero sy={sy} name={name} startDate={startDate}/>
    <QuoteRibbon/>
    <PhotoGallery/>
    <QuoteRibbon/>
    <VideoFrame/>
    <LoveLetter name={name}/>
    <Timeline/>
    <Finale name={name} onConfetti={()=>launchConfetti(5200)}/>
    <Credits name={name}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
